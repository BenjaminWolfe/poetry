title: "Looking Back"
author: "Ursula K. Le Guin"

lines:
  - "Remember me before I was a heap of salt"
  - "The laughing child who seldom did what she was told"
  - "Or came when she was called"
  - "The merry girl who became Lot's bride"
  - "The happy woman who loved her wicked city"
  - ""
  - "Do not remember me with pity"
  - "I saw you plodding on ahead into the desert of your pitiless faith"
  - "Those springs are dry; that earth is dead"
  - "So I looked back, not forward into death"
  - "Forgiving rains dissolve me"
  - "And I come still disobedient, still happy"
  - "Home"

# Connection ordering matters: when two connections share a phrase, the one
# listed LAST (highest index) wins the tie-break and becomes the active connection.
# Key design decisions:
#   - "wicked city" → wicked city/looked back/home wins (last) → yellow glow
#   - "pity"        → city/pity wins over pity/pitiless → pink glow, re-activating
#                     "wicked city" alongside "pity"
#   - "pitiless"    → only pity/pitiless triggers → lime glow, both phrases
#   - "looked back" → wicked city/home wins over ahead/... → yellow, two phrases
#   - "not forward" → only ahead/... triggers → blue re-activates, all three phrases

connections:
  - label: "remember me / do not remember me"
    color: "#c084fc"
    phrases:
      - {line: 1, text: "Remember me"}
      - "Do not remember me"

  - label: "a heap of salt / dissolve"
    color: "#fbbf24"
    phrases:
      - "a heap of salt"
      - "dissolve"

  # "heap of salt / dissolve me" listed after "a heap of salt / dissolve" so that
  # at "dissolve" (same start char as "dissolve me"), this connection wins the tie.
  - label: "heap of salt / dissolve me"
    color: "#818cf8"
    phrases:
      - "heap of salt"
      - "dissolve me"

  - label: "salt / called"
    color: "#2dd4bf"
    phrases:
      - "salt"
      - "called"

  - label: "child / girl / woman"
    color: "#fb923c"
    phrases:
      - "The laughing *child*"
      - "The merry *girl*"
      - "The happy *woman*"

  - label: "disobedient"
    color: "#38bdf8"
    phrases:
      - "seldom did what she was told"
      - "still disobedient"

  - label: "came / come"
    color: "#e879f9"
    phrases:
      - "came"
      - "come"

  - label: "happy"
    color: "#34d399"
    phrases:
      - "*happy* woman"
      - "still *happy*"

  - label: "pity / pitiless"
    color: "#a3e635"
    phrases:
      - "pity"
      - "*pitiless* faith"

  - label: "ahead / looked back / not forward"
    color: "#60a5fa"
    phrases:
      - "ahead"
      - "looked back"
      - "not forward"

  # "city / pity" listed after "pity / pitiless" so at "pity" it wins the tie,
  # re-activating the "wicked city" glow alongside "pity".
  - label: "city / pity"
    color: "#f472b6"
    phrases:
      - "wicked city"
      - "pity"

  - label: "desert / springs / earth"
    color: "#f87171"
    phrases:
      - "desert"
      - "springs"
      - "earth"

  - label: "dead / death"
    color: "#a78bfa"
    phrases:
      - "dead"
      - "death"

  # "wicked city / looked back / home" listed last so it wins ties at both
  # "wicked city" (over city/pity) and "looked back" (over ahead/...).
  - label: "wicked city / looked back / home"
    color: "#facc15"
    phrases:
      - "wicked city"
      - "looked back"
      - "Home"
