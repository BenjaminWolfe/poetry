title: "Looking Back"
author: "Ursula K. Le Guin"

lines:
  - "Remember me before I was a heap of salt"
  - "The laughing child who seldom did what she was told"
  - "Or came when she was called"
  - "The merry girl who became Lot's bride"
  - "The happy woman who loved her wicked city"
  - ""
  - "Do not remember me with pity"
  - "I saw you plodding on ahead into the desert of your pitiless faith"
  - "Those springs are dry; that earth is dead"
  - "So I looked back, not forward into death"
  - "Forgiving rains dissolve me"
  - "And I come still disobedient, still happy"
  - "Home"

# When two connections share a phrase start position, the one listed LAST wins
# the tie-break and becomes the active connection. Key decisions:
#   - "wicked city" → wicked city/looked back/home wins (listed last) → yellow
#   - "pity"        → pity/pitiless wins over city/pity (listed after it)
#   - "looked back" → wicked city/looked back/home wins over ahead/...

connections:
  - label: "remember me / do not remember me"
    color: "#c084fc"
    phrases:
      - {line: 1, text: "Remember me"}
      - "Do not remember me"

  - label: "a heap of salt / dissolve"
    color: "#fbbf24"
    phrases:
      - "a heap of salt"
      - "dissolve"

  - label: "salt / called"
    color: "#2dd4bf"
    phrases:
      - "salt"
      - "called"

  - label: "child / girl / woman"
    color: "#fb923c"
    phrases:
      - "The laughing *child*"
      - "The merry *girl*"
      - "The happy *woman*"

  - label: "disobedient"
    color: "#38bdf8"
    phrases:
      - "seldom did what she was told"
      - "still disobedient"

  - label: "came / come"
    color: "#e879f9"
    phrases:
      - "came"
      - "come"

  - label: "happy"
    color: "#34d399"
    phrases:
      - "*happy* woman"
      - "still *happy*"

  - label: "city / pity"
    color: "#f472b6"
    phrases:
      - "wicked city"
      - "pity"

  - label: "pity / pitiless"
    color: "#a3e635"
    phrases:
      - "pity"
      - "pitiless"

  - label: "ahead / looked back / not forward"
    color: "#60a5fa"
    phrases:
      - "ahead"
      - "looked back"
      - "not forward"

  - label: "desert / springs / earth"
    color: "#f87171"
    phrases:
